# Mock applications for local testing (no ArgoCD needed)
# Run: ./argazer --mock-apps mock_apps.yaml --output-format table --log-format text
#
# Uses deliberately old versions so updates are always detected.

# Traditional HTTP Helm repos
- name: cert-manager
  project: platform
  chart: cert-manager
  repo_url: https://charts.jetstack.io
  current_version: "1.14.0"

- name: ingress-nginx
  project: production
  chart: ingress-nginx
  repo_url: https://kubernetes.github.io/ingress-nginx
  current_version: "4.9.0"

- name: kube-prometheus-stack
  project: monitoring
  chart: kube-prometheus-stack
  repo_url: https://prometheus-community.github.io/helm-charts
  current_version: "55.0.0"

# OCI registry (GitHub Container Registry — public)
- name: podinfo
  project: staging
  chart: podinfo
  repo_url: ghcr.io/stefanprodan/charts
  current_version: "6.5.0"
