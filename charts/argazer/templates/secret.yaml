{{- $secretData := dict -}}

{{- /* ArgoCD credentials */}}
{{- if not .Values.argocd.existingSecret }}
{{- if .Values.argocd.username }}
{{- $_ := set $secretData "argocd-username" (.Values.argocd.username | b64enc) }}
{{- end }}
{{- if .Values.argocd.password }}
{{- $_ := set $secretData "argocd-password" (.Values.argocd.password | b64enc) }}
{{- end }}
{{- end }}

{{- /* Telegram */}}
{{- if and (eq .Values.notifications.channel "telegram") (not .Values.notifications.telegram.existingSecret) }}
{{- if .Values.notifications.telegram.webhook }}
{{- $_ := set $secretData "telegram-webhook" (.Values.notifications.telegram.webhook | b64enc) }}
{{- end }}
{{- if .Values.notifications.telegram.chatId }}
{{- $_ := set $secretData "telegram-chat-id" (.Values.notifications.telegram.chatId | b64enc) }}
{{- end }}
{{- end }}

{{- /* Email */}}
{{- if and (eq .Values.notifications.channel "email") (not .Values.notifications.email.existingSecret) }}
{{- if .Values.notifications.email.smtpUsername }}
{{- $_ := set $secretData "email-smtp-username" (.Values.notifications.email.smtpUsername | b64enc) }}
{{- end }}
{{- if .Values.notifications.email.smtpPassword }}
{{- $_ := set $secretData "email-smtp-password" (.Values.notifications.email.smtpPassword | b64enc) }}
{{- end }}
{{- end }}

{{- /* Slack */}}
{{- if and (eq .Values.notifications.channel "slack") (not .Values.notifications.slack.existingSecret) }}
{{- if .Values.notifications.slack.webhook }}
{{- $_ := set $secretData "slack-webhook" (.Values.notifications.slack.webhook | b64enc) }}
{{- end }}
{{- end }}

{{- /* Teams */}}
{{- if and (eq .Values.notifications.channel "teams") (not .Values.notifications.teams.existingSecret) }}
{{- if .Values.notifications.teams.webhook }}
{{- $_ := set $secretData "teams-webhook" (.Values.notifications.teams.webhook | b64enc) }}
{{- end }}
{{- end }}

{{- /* Generic Webhook */}}
{{- if and (eq .Values.notifications.channel "webhook") (not .Values.notifications.webhook.existingSecret) }}
{{- if .Values.notifications.webhook.url }}
{{- $_ := set $secretData "webhook-url" (.Values.notifications.webhook.url | b64enc) }}
{{- end }}
{{- end }}

{{- if $secretData }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "argazer.secretName" . }}
  labels:
    {{- include "argazer.labels" . | nindent 4 }}
type: Opaque
data:
  {{- range $key, $val := $secretData }}
  {{ $key }}: {{ $val }}
  {{- end }}
{{- end }}
